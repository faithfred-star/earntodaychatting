{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - EarnTodayChattingWithLonelyWhiteManGlobally</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <div class="register-container">
        <header>
            <h1>EARN TODAY</h1>
            <p>Chat Globally & Get Paid</p>
        </header>

        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <p class="{{ message.tags }}">{{ message }}</p>
                {% endfor %}
            </div>
        {% endif %}

        <form method="POST" action="{% url 'register' %}">
    {% csrf_token %}
    
    <div class="input-group" style="margin-bottom: 15px;">
        <input type="text" name="full_name" placeholder="Full Name" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box;">
    </div>
    
    <div class="input-group" style="margin-bottom: 15px;">
        <input type="email" name="email" placeholder="Email Address" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box;">
    </div>
    
    <div class="input-group" style="margin-bottom: 15px;">
        <input type="text" name="username" placeholder="Username" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box;">
    </div>

    <div class="input-group" style="margin-bottom: 15px;">
        <input type="tel" name="phone_number" placeholder="Phone Number (e.g., 07XXXXXXXX)" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box;">
    </div>
    
    <div class="input-group" style="margin-bottom: 15px;">
        <input type="password" name="password" placeholder="Password" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box;">
    </div>
    
    <div class="input-group" style="margin-bottom: 15px;">
        <!-- REMOVED readonly HERE SO USERS CAN TYPE OR LEAVE BLANK -->
        <input type="text" name="ref" value="{{ ref_code }}" placeholder="Referral Code (Optional)" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box;">
        <small style="color: #666; display: block; margin-top: 4px;">Referral Code</small>
    </div>
    
    <button type="submit" style="width: 100%; padding: 12px; background-color: #28a745; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; font-weight: bold;">
        CREATE ACCOUNT
    </button>
</form>
        <footer>
            <p>Already have an account? <a href="#">Login here</a></p>
        </footer>
    </div>
</body>
</html>
