{% extends 'base.html' %}

{% block content %}
<div style="max-width: 800px; margin: 40px auto; font-family: sans-serif; padding: 20px;">
    <div style="background: #28a745; color: white; padding: 20px; border-radius: 8px; margin-bottom: 20px;">
        <h2>Welcome to Your Earning Dashboard!</h2>
        <p>Status: <strong>Verified Account</strong></p>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        <div style="border: 1px solid #ddd; padding: 20px; border-radius: 8px;">
            <h3>Current Balance</h3>
            <p style="font-size: 24px; color: #28a745; font-weight: bold;">$0.00</p>
        </div>
        <div style="border: 1px solid #ddd; padding: 20px; border-radius: 8px;">
            <h3>Chat Options</h3>
            <p>Start chatting to complete your daily earning tasks.</p>
            <a href="#" style="display: inline-block; padding: 10px 15px; background: #007bff; color: white; text-decoration: none; border-radius: 4px;">Open Chat Room</a>
        </div>
    </div>
</div>
{% endblock %}
